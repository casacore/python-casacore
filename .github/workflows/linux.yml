name: Linux

on:
  push:
    branches: [ master ]
    tags: [ "*" ]
  pull_request:
    branches: [ master ]

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        dist:
          - py3_casacore_master
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Needed for `setuptools-scm`
          fetch-depth: 0

      - name: Build container
        run: docker build . -t ${{ matrix.dist }} -f .github/workflows/${{ matrix.dist }}.docker
